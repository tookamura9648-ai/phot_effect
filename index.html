<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>自由画像ARプラットフォーム</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255,255,255,0.8); padding: 15px;
            border-radius: 10px; text-align: center; width: 80%;
        }
        input[type="file"] { margin-bottom: 10px; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <p style="margin:0 0 10px 0; font-size: 14px; font-weight: bold;">Step 1: 画像を選択してください</p>
        <input type="file" id="imageSelector" accept="image/*">
        <p style="margin:5px 0 0 0; font-size: 12px; color: #666;">※画像を選んだら、カメラを床や平らな場所に向けてください</p>
    </div>
    
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    
    <a-assets id="assets"></a-assets>
    <a-image id="arImage" position="0 0 -1" scale="0.5 0.5 0.5" visible="false"></a-image>

    <a-entity camera>
        <a-image id="arImage" position="0 0 -1" visible="false"></a-image>
    </a-entity>
    
</a-scene>


    <script>
        const input = document.getElementById('imageSelector');
        const arImage = document.getElementById('arImage');

        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    // 画像のURLを設定して表示
                    arImage.setAttribute('src', event.target.result);
                    arImage.setAttribute('visible', true);
                    
                    // アスペクト比を自動調整（画像が伸びないようにする）
                    const img = new Image();
                    img.onload = function() {
                        const aspect = this.width / this.height;
                        arImage.setAttribute('scale', `${aspect} 1 1`);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
