<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唐橋・竜神召喚AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #222; }
        model-viewer { width: 100%; height: 90%; background-color: #333; }
        .ar-button {
            background-color: #007bff; color: white; border: none;
            border-radius: 50px; padding: 16px 32px;
            font-size: 20px; font-weight: bold; cursor: pointer;
            position: fixed; bottom: 40px; z-index: 100;
        }
    </style>
</head>
<body>

    <model-viewer 
        src=""
        ar 
        ar-modes="scene-viewer quick-look" 
        camera-controls 
        alt="琵琶湖の竜神"
        poster="1000003260.png">
        
        <button slot="ar-button" class="ar-button">
            🐲 竜神を召喚する
        </button>

    </model-viewer>

    <script>
        // ボタンを押した時に、AndroidのAR機能を直接呼び出すスクリプト
        const modelViewer = document.querySelector('model-viewer');
        const imgName = '1000003260.png'; // あなたの画像ファイル名
        
        // ページのURLを取得
        const url = window.location.href.replace('index.html', '') + imgName;

        // Android用：Scene Viewerを画像モードで起動する設定
        const intent = `intent://arvr.google.com/scene-viewer/1.0?file=${url}&mode=ar_only#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;S.browser_fallback_url=https://developers.google.com/ar;end;`;

        modelViewer.addEventListener('click', (e) => {
            if (modelViewer.canActivateAR) {
                // 標準機能で動く場合はそのまま
            } else {
                // 動かない場合は直接Intentを発行（Android用）
                if (/Android/i.test(navigator.userAgent)) {
                    window.location.href = intent;
                }
            }
        });
    </script>
</body>
</html>
