<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR手のひら召喚・最終形態</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95); padding: 12px;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
            width: 92%; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease-out;
        }
        #ui.hidden { transform: translateX(-50%) translateY(92%); }
        .control-group { margin-bottom: 6px; }
        label { display: block; font-size: 10px; color: #444; margin-bottom: 2px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; height: 18px; }
        .btn-container { display: flex; justify-content: space-around; margin-top: 8px; gap: 8px; }
        button { padding: 8px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; flex: 1; font-size: 12px; }
        #shutterBtn { background: #ff4757; color: white; }
        #toggleBtn { background: #2f3542; color: white; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <div style="text-align: right;">
            <button id="toggleBtn" style="width: auto; padding: 4px 12px; font-size: 10px;">パネル表示切替</button>
        </div>
        <div class="control-group">
            <input type="file" id="imageSelector" accept="image/*,.glb" style="font-size: 11px;">
        </div>
        
        <div class="control-group"><label>大きさ</label><input type="range" id="sizeSlider" min="0.05" max="3.0" step="0.05" value="0.5"></div>
        <div class="control-group"><label>左右/上下</label>
            <input type="range" id="posXSlider" min="-2.0" max="2.0" step="0.05" value="0">
            <input type="range" id="posYSlider" min="-2.0" max="2.0" step="0.05" value="0">
        </div>
        <div class="control-group"><label>遠近 (Z)</label><input type="range" id="posZSlider" min="-5.0" max="-0.3" step="0.05" value="-1.0"></div>
        
        <div class="control-group">
            <label>傾き・回転 (R)</label>
            <input type="range" id="rotSlider" min="0" max="360" step="1" value="0">
        </div>

        <div class="btn-container">
            <button id="shutterBtn">📷 保存（またはスクショ）</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" renderer="preserveDrawingBuffer: true;">
        <a-entity camera>
            <a-image id="arImage" position="0 0 -1" visible="false"></a-image>
            <a-entity id="arModel" position="0 0 -1" scale="0.5 0.5 0.5" gltf-model="" visible="false"></a-entity>
            <a-circle id="arShadow" position="0 -0.3 -1" rotation="-90 0 0" radius="0.3" 
                      material="shader: flat; color: black; transparent: true; opacity: 0.3; blending: multiply;" visible="false">
            </a-circle>
        </a-entity>
    </a-scene>

    <script>
        (function() {
            const ui = document.getElementById('ui'), toggleBtn = document.getElementById('toggleBtn'), shutterBtn = document.getElementById('shutterBtn'), fileInput = document.getElementById('imageSelector');
            const arImage = document.getElementById('arImage'), arModel = document.getElementById('arModel'), arShadow = document.getElementById('arShadow');
            const sizeSlider = document.getElementById('sizeSlider'), posXSlider = document.getElementById('posXSlider'), posYSlider = document.getElementById('posYSlider'), posZSlider = document.getElementById('posZSlider'), rotSlider = document.getElementById('rotSlider');

            let currentAspect = 1.0, is3D = false;

            toggleBtn.addEventListener('click', () => {
                ui.classList.toggle('hidden');
                toggleBtn.innerText = ui.classList.contains('hidden') ? '設定を開く' : 'パネルを隠す';
            });

            shutterBtn.addEventListener('click', () => {
                const scene = document.querySelector('a-scene');
                scene.renderer.render(scene.object3D, scene.camera);
                const link = document.createElement('a');
                link.download = 'AR_Photo_' + Date.now() + '.png';
                link.href = scene.canvas.toDataURL('image/png');
                link.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    if (file.name.toLowerCase().endsWith('.glb')) {
                        is3D = true; arImage.setAttribute('visible', false); arModel.setAttribute('gltf-model', dataUrl); arModel.setAttribute('visible', true);
                    } else {
                        is3D = false; arModel.setAttribute('visible', false); arImage.setAttribute('src', dataUrl); arImage.setAttribute('visible', true);
                        const img = new Image();
                        img.onload = function() { currentAspect = this.width / this.height; updateAll(); };
                        img.src = dataUrl;
                    }
                    arShadow.setAttribute('visible', true);
                    updateAll();
                };
                reader.readAsDataURL(file);
            });

            [sizeSlider, posXSlider, posYSlider, posZSlider, rotSlider].forEach(slider => {
                slider.addEventListener('input', updateAll);
            });

            function updateAll() {
                const s = parseFloat(sizeSlider.value), x = parseFloat(posXSlider.value), y = parseFloat(posYSlider.value), z = parseFloat(posZSlider.value), r = parseFloat(rotSlider.value);
                const posStr = `${x} ${y} ${z}`;

                arImage.setAttribute('position', posStr);
                arModel.setAttribute('position', posStr);
                
                if (is3D) {
                    arModel.setAttribute('scale', `${s} ${s} ${s}`);
                    arModel.setAttribute('rotation', `0 ${r} 0`); // 3DモデルはY軸回転（横回転）
                } else {
                    arImage.setAttribute('scale', `${currentAspect * s} ${s} 1`);
                    arImage.setAttribute('rotation', `0 0 ${r}`); // 画像はZ軸回転（お面のように回る）
                }
                
                const shadowY = y - (s * 0.5) - 0.05;
                arShadow.setAttribute('position', `${x} ${shadowY} ${z}`);
                arShadow.setAttribute('scale', `${s * 0.6} ${s * 0.6} 1`);
            }
        })();
    </script>
</body>
</html>
